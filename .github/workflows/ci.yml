name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm i --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm -r --filter='./packages/*' run test
      - run: pnpm smoke
      - run: pnpm smoke:next
