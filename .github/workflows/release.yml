name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      # npm Trusted Publishing (OIDC) requires npm CLI >= 11.5.1.
      # Node 22 ships an older npm; upgrade explicitly.
      - run: npm install -g npm@latest

      - run: pnpm i --frozen-lockfile

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          # Prefer a PAT that can create PRs (repo settings may block GITHUB_TOKEN).
          # Create `CHANGESETS_TOKEN` with `contents:write` + `pull-requests:write`.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN || secrets.GITHUB_TOKEN }}
          # Trusted Publishing: do NOT set NODE_AUTH_TOKEN. Pass NPM_TOKEN as an
          # empty string so changesets/action doesn't inject an _authToken into
          # the user .npmrc (which would force token auth and break OIDC).
          NPM_TOKEN: ''
