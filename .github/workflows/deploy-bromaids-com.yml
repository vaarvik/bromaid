name: Deploy bromaids-com

on:
  push:
    branches: [main]
    paths:
      - 'apps/bromaids-com/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-bromaids-com.yml'
  workflow_dispatch:

concurrency:
  group: deploy-bromaids-com
  cancel-in-progress: false

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            apps/bromaids-com/.next/cache
            apps/bromaids-com/.open-next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/bromaids-com/**/*.[jt]s', 'apps/bromaids-com/**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm i --frozen-lockfile

      - run: pnpm build

      - run: pnpm --filter @bromaid-apps/bromaid-com build:worker

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @bromaid-apps/bromaid-com run deploy
