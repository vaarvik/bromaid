name: Deploy bromaids-com

on:
  push:
    branches: [main]
    paths:
      - 'apps/bromaids-com/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-bromaids-com.yml'
  workflow_dispatch:

concurrency:
  group: deploy-bromaids-com
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm i --frozen-lockfile

      - run: pnpm build

      - run: pnpm --filter @bromaid-apps/bromaid-com build:worker

      - name: Deploy to Cloudflare
        working-directory: apps/bromaids-com
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec opennextjs-cloudflare deploy
